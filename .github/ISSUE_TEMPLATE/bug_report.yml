name: "🐛 Bug report"
description: "Something in Vanish is broken or behaving unexpectedly."
title: "[bug] <short description>"
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: "What did you expect? What actually happened?"
      placeholder: "I ran `vanish scan ...` and got ..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: "Exact commands + any inputs"
      placeholder: |
        1. node scripts/index.mjs scan --name "Test"
        2. ...
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Vanish version
      description: "From package.json or `git rev-parse --short HEAD`"
      placeholder: "0.2.0 or commit 79656ca"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 10/11
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Arch)
        - Linux (Other)
        - Other
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: "Output of `node --version`"
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error / stack trace (if any)
      description: "Redact any personal data before pasting"
      render: shell
    validations:
      required: false
