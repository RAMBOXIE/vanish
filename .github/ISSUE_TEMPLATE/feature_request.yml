name: "✨ Feature request"
description: "A feature, broker, or UX improvement you'd like to see."
title: "[feat] <short description>"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: "Describe your use case, not the implementation"
      placeholder: "When I try to ... I have to do ... because ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would solve it?
      description: "Ideally, something that matches existing architecture. Check CONTRIBUTING.md first."
      placeholder: "A new command / flag / config option that ..."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How much does this matter to you?
      options:
        - "Nice-to-have"
        - "Would use regularly if existed"
        - "Blocker — I can't use Vanish without this"
    validations:
      required: true

  - type: checkboxes
    id: commitments
    attributes:
      label: Respecting the safety boundaries
      description: "Read these before opening feature requests (see CONTRIBUTING.md)"
      options:
        - label: "This does not add telemetry / phone-home / analytics"
          required: true
        - label: "This does not add paid dependencies (2captcha, cloud API, etc.)"
          required: true
        - label: "This does not add scheduled/automated submission (manual-trigger only)"
          required: true
