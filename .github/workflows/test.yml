name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        env:
          VANISH_AUDIT_HMAC_KEY: ci-test-key-do-not-use-in-production
          VANISH_SECRET_MASTER_KEY: ci-test-master-key

      - name: Smoke test — scan CLI
        run: node scripts/index.mjs scan --name "CI Test User" --email "ci@example.com"

      - name: Smoke test — opt-out --no-open
        run: node scripts/index.mjs opt-out --broker spokeo --email "ci@example.com" --full-name "CI Test" --profile-url "https://example.com/ci" --no-open --state-file /tmp/ci-state.json
        if: runner.os != 'Windows'

      - name: Smoke test — opt-out --no-open (Windows)
        run: node scripts/index.mjs opt-out --broker spokeo --email "ci@example.com" --full-name "CI Test" --profile-url "https://example.com/ci" --no-open --state-file $env:TEMP/ci-state.json
        if: runner.os == 'Windows'
